name: QA Review

on:
  pull_request:
    types: [opened, ready_for_review, synchronize]
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  qa-review:
    runs-on: ubuntu-latest

    steps:
      # ── Resolve which PR triggered this run ─────────────────────────────────
      - name: Resolve PR context
        id: ctx
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ "$GITHUB_EVENT_NAME" == "pull_request" ]]; then
            echo "pr_number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
            echo "head_ref=${{ github.event.pull_request.head.ref }}"   >> "$GITHUB_OUTPUT"
            echo "is_draft=${{ github.event.pull_request.draft }}"      >> "$GITHUB_OUTPUT"
            echo "skip=false"                                            >> "$GITHUB_OUTPUT"
          else
            # issue_comment — only act if it's a PR comment with the trigger phrase
            if [[ -z "${{ github.event.issue.pull_request.url }}" ]]; then
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            if ! grep -q "QA review requested" <<< "${{ github.event.comment.body }}"; then
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            PR_DATA=$(gh pr view ${{ github.event.issue.number }} --json headRefName,isDraft)
            echo "pr_number=${{ github.event.issue.number }}"                       >> "$GITHUB_OUTPUT"
            echo "head_ref=$(echo "$PR_DATA" | jq -r '.headRefName')"              >> "$GITHUB_OUTPUT"
            echo "is_draft=$(echo "$PR_DATA" | jq -r '.isDraft')"                  >> "$GITHUB_OUTPUT"
            echo "skip=false"                                                        >> "$GITHUB_OUTPUT"
          fi

      # ── Gate: branch prefix, draft status, already-labelled ─────────────────
      - name: Gate check
        id: gate
        if: steps.ctx.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          HEAD_REF="${{ steps.ctx.outputs.head_ref }}"
          IS_DRAFT="${{ steps.ctx.outputs.is_draft }}"
          PR="${{ steps.ctx.outputs.pr_number }}"

          if [[ "$HEAD_REF" != feature/* && "$HEAD_REF" != fix/* && "$HEAD_REF" != live/* ]]; then
            echo "skip=true"  >> "$GITHUB_OUTPUT"
            echo "reason=branch $HEAD_REF is not feature/, fix/, or live/" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "$IS_DRAFT" == "true" ]]; then
            echo "skip=true"           >> "$GITHUB_OUTPUT"
            echo "reason=PR is draft"  >> "$GITHUB_OUTPUT"
            exit 0
          fi

          LABELS=$(gh pr view "$PR" --json labels -q '.labels[].name' | tr '\n' ' ')
          if echo "$LABELS" | grep -qE 'qa-approved|qa-failed'; then
            echo "skip=true"                        >> "$GITHUB_OUTPUT"
            echo "reason=PR already has QA verdict" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "skip=false" >> "$GITHUB_OUTPUT"

      # ── Checkout full history so QA can read game files ─────────────────────
      - name: Checkout
        if: steps.ctx.outputs.skip != 'true' && steps.gate.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Run the QA agent via Claude Code Action ──────────────────────────────
      - name: Run QA Agent
        if: steps.ctx.outputs.skip != 'true' && steps.gate.outputs.skip != 'true'
        uses: anthropics/claude-code-action@beta
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          allowed_tools: "Bash,Read,Glob,Grep"
          prompt: |
            Read CLAUDE.md first and follow every absolute rule in it without exception.

            You are the QA agent. Read agents/qa/AGENT.md before doing anything else.

            PR to review: #${{ steps.ctx.outputs.pr_number }}

            Run all QA checks in sequence. If Check 1 (Luau Lint) produces a blocking failure
            you may stop there and deliver the verdict, but note the skipped checks.

            ── Check 1: Luau Lint ─────────────────────────────────────────────
            Follow agents/qa/checklists/luau-lint.md exactly.
            Apply every rule (LU-01 through LU-26) to every new or modified Luau script in the
            PR diff. Get the full diff with:
              gh pr diff ${{ steps.ctx.outputs.pr_number }}

            ── Check 2: Feature Test ──────────────────────────────────────────
            Follow agents/qa/prompts/feature-test.md exactly.

            ── Check 3: Regression Check ─────────────────────────────────────
            Follow agents/qa/prompts/regression-check.md exactly.

            ── Check 4: Playtest Evaluation ──────────────────────────────────
            SKIP — Roblox Studio MCP is not available in this CI environment.
            Note in the verdict: "Playtest skipped (CI — run locally to complete playtest eval)."

            ── Verdict ───────────────────────────────────────────────────────
            APPROVED (all critical checks pass):
              gh pr edit ${{ steps.ctx.outputs.pr_number }} --add-label "qa-approved"
              gh pr comment ${{ steps.ctx.outputs.pr_number }} \
                --body "QA approved. Ready to merge.

            {paste your full QA: Feature Test Result block here}"
              Update the task's qa_verdict to 'approved' in the sprint log.
              Commit and push: git add games/*/sprint-log.md && \
                git commit -m "[{game}] qa: approved task {task_id}" && \
                git pull --rebase origin main && git push origin main

            BLOCKED (any critical check fails):
              gh pr edit ${{ steps.ctx.outputs.pr_number }} --add-label "qa-failed"
              Comment with every failure including file name, line number, expected vs found.
              Update the task's qa_verdict to 'blocked' in the sprint log.
              Commit and push the sprint log update as above.

            SECURITY or DATA-LOSS concern (in addition to approve/block):
              gh pr edit ${{ steps.ctx.outputs.pr_number }} --add-label "needs-human"
              Describe the concern in the PR comment.

            NEVER modify source files. NEVER merge or close the PR.
