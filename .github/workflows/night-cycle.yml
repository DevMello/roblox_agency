# night-cycle.yml — NOT USED FOR LOCAL OPERATION
#
# This file is a placeholder. The night cycle is run locally via:
#   bash scripts/launch-night-cycle.sh [game-name]
#
# If you later want to run the agency on a GitHub Actions self-hosted runner,
# restore the job definition here and configure your runner to start the
# MCP servers (Roblox Studio MCP on :3001) and the gh CLI authenticated before
# the workflow fires.
#
# For now, use the scripts directly from a terminal or task scheduler.

name: Night Cycle (disabled)
on:
  workflow_dispatch:
    inputs:
      note:
        description: 'This workflow is disabled. Run scripts/launch-night-cycle.sh locally.'
        required: false
jobs:
  disabled:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Run scripts/launch-night-cycle.sh on your local machine instead."
