# weekly-research.yml — NOT USED FOR LOCAL OPERATION
#
# Weekly research is run locally via:
#   bash scripts/launch-weekly-research.sh
#
# Chrome MCP (localhost:3003) must be running for full browsing capability.
# Without it, the Market Researcher falls back to WebSearch tool.

name: Weekly Research (disabled)
on:
  workflow_dispatch:
    inputs:
      note:
        description: 'This workflow is disabled. Run scripts/launch-weekly-research.sh locally.'
        required: false
jobs:
  disabled:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Run scripts/launch-weekly-research.sh on your local machine instead."
