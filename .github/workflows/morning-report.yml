# morning-report.yml — NOT USED FOR LOCAL OPERATION
#
# The morning report is generated automatically at the end of the night cycle:
#   bash scripts/launch-morning-report.sh
#
# It is also called by launch-night-cycle.sh as its final step, so you
# do not normally need to run it separately.

name: Morning Report (disabled)
on:
  workflow_dispatch:
    inputs:
      note:
        description: 'This workflow is disabled. Run scripts/launch-morning-report.sh locally.'
        required: false
jobs:
  disabled:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Run scripts/launch-morning-report.sh on your local machine instead."
